<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AdaptLight Visualizer</title>
  <meta name="color-scheme" content="light dark">
  <script>
    (() => {
      var saved = localStorage.getItem("theme");
      var theme = saved || (window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
      var root = document.documentElement;
      var meta = document.querySelector('meta[name="color-scheme"]');
      var scheme = theme === "light" ? "only light" : "dark light";
      root.setAttribute("data-theme", theme);
      if (meta) meta.content = scheme;
      root.style.colorScheme = scheme;
      root.style.backgroundColor = theme === "light" ? "#f5f5f5" : "#0c0c0e";
    })();
  </script>
  <style>
    html { background: #0c0c0e; color-scheme: dark light; }
    html[data-theme="light"] { background: #f5f5f5; color-scheme: only light; }
    html[data-theme="dark"] { background: #0c0c0e; color-scheme: dark light; }
    @media (prefers-color-scheme: light) {
      html:not([data-theme="dark"]) { background: #f5f5f5; color-scheme: only light; }
    }
  </style>
  <link rel="icon" href="resources/icon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="resources/style.css">
</head>
<body>

  <svg aria-hidden="true" focusable="false" style="display:none">
    <defs>
      <symbol id="icon-sidebar-panel" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.6">
        <rect width="18" height="18" x="3" y="3" rx="2"/><path d="M9 3v18m6-13-3 4 3 4"/>
      </symbol>
    </defs>
  </svg>

  <aside id="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-title-block">
        <a class="sidebar-title" href="https://github.com/AdaptLight/adapt-light" target="_blank" rel="noopener noreferrer">
          <img src="resources/icon.svg" alt="" width="20" height="20">
          <h1>AdaptLight</h1>
        </a>
        <span class="sidebar-subtitle">Visualizer</span>
      </div>
      <div class="header-buttons">
        <button id="themeToggle" type="button" title="Toggle light/dark mode">
          <svg id="themeIconSun" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" aria-hidden="true" viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"/><path d="M12 1v2m0 18v2M4.2 4.2l1.4 1.4m12.8 12.8 1.4 1.4M1 12h2m18 0h2M4.2 19.8l1.4-1.4M18.4 5.6l1.4-1.4"/></svg>
          <svg id="themeIconMoon" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" aria-hidden="true" viewBox="0 0 24 24"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8"/></svg>
        </button>
        <button id="sidebarHide" type="button" title="Hide sidebar">
          <svg aria-hidden="true" viewBox="0 0 24 24"><use href="#icon-sidebar-panel"/></svg>
        </button>
      </div>
    </div>

    <div class="curve-type-row">
      <section class="control-group">
        <h2>Curve type</h2>
        <div class="toggle-row">
          <select id="curveType">
            <option value="linear" selected>Linear</option>
            <option value="smooth">Smooth/Cosine</option>
            <option value="steep">Steep/Tanh</option>
            <option value="ease_in">Ease-in</option>
            <option value="ease_out">Ease-out</option>
          </select>
        </div>
      </section>
      <div class="chart-toggle-stack">
        <button id="overlayToggle" type="button" title="Toggle grid & now overlay">
          <svg id="overlayIconShow" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="-.5 .3 24 24"><rect width="19" height="19" x="2" y="3" rx="2.5"/><path d="M8.5 3v19m6-19v19M2 9.5h19m-19 6h19"/></svg>
          <svg id="overlayIconHide" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="-.5 .3 24 24"><defs><clipPath id="a"><path d="M3 0h21v21z"/></clipPath><clipPath id="c"><path d="M0 1.7V24h22.3z"/></clipPath><g id="b"><rect width="19" height="19" x="2" y="3" rx="2.5"/><path d="M8.5 3v19m6-19v19M2 9.5h19m-19 6h19"/></g></defs><use clip-path="url(#a)" href="#b"/><use clip-path="url(#c)" href="#b"/><path d="m.5 1.4 22 22"/></svg>
        </button>
        <button id="brightnessAlphaToggle" type="button" title="Toggle brightness opacity gradient">
          <svg id="brightnessAlphaIconOn" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" aria-hidden="true" viewBox="0 0 24 24"><path d="M12 2.69l5.66 5.66a8 8 0 1 1-11.31 0z"/></svg>
          <svg id="brightnessAlphaIconOff" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" aria-hidden="true" viewBox="0 0 24 24"><path d="M12 2.69l5.66 5.66a8 8 0 1 1-11.31 0z"/><line x1="3" y1="3" x2="21" y2="21"/></svg>
        </button>
      </div>
    </div>

    <section class="control-group">
      <h2>Brightness</h2>
      <div class="slider-row">
        <label for="minBrightness">Min</label>
        <input type="range" id="minBrightness" min="0" max="100" value="10">
        <input type="number" class="num-input" id="minBrightnessNum" min="0" max="100" value="10">
      </div>
      <div class="slider-row">
        <label for="maxBrightness">Max</label>
        <input type="range" id="maxBrightness" min="0" max="100" value="100">
        <input type="number" class="num-input" id="maxBrightnessNum" min="0" max="100" value="100">
      </div>
    </section>

    <section class="control-group">
      <div class="section-header-row">
        <h2>Timings</h2>
        <button id="clockToggle" type="button" class="clock-toggle-btn" title="Toggle 12h/24h clock">
          <span id="clockLabel">24-hour clock</span>
        </button>
      </div>
      <div class="time-row">
        <label for="wakeStart">Wake start</label>
        <input type="text" id="wakeStart" value="07:00" style="display:none">
        <button type="button" class="time-reset-btn" data-for="wakeStart" title="Reset">Reset</button>
      </div>
      <div class="time-row">
        <label for="wakeEnd">Wake end</label>
        <input type="text" id="wakeEnd" value="09:00" style="display:none">
        <button type="button" class="time-reset-btn" data-for="wakeEnd" title="Reset">Reset</button>
      </div>
      <div class="time-row">
        <label for="dozeStart">Doze start</label>
        <input type="text" id="dozeStart" value="20:00" style="display:none">
        <button type="button" class="time-reset-btn" data-for="dozeStart" title="Reset">Reset</button>
      </div>
      <div class="time-row">
        <label for="dozeEnd">Doze end</label>
        <input type="text" id="dozeEnd" value="22:00" style="display:none">
        <button type="button" class="time-reset-btn" data-for="dozeEnd" title="Reset">Reset</button>
      </div>

      <div class="section-divider"></div>

      <div class="toggle-row">
        <input type="checkbox" id="syncCurves" checked>
        <label for="syncCurves">Sync color timings</label>
      </div>
      <div id="colorTimingSection" style="display:none;">
        <div class="time-row">
          <label for="colorWakeStart">Color wake start</label>
          <input type="text" id="colorWakeStart" value="05:30" style="display:none">
        </div>
        <div class="time-row">
          <label for="colorWakeEnd">Color wake end</label>
          <input type="text" id="colorWakeEnd" value="09:00" style="display:none">
        </div>
        <div class="time-row">
          <label for="colorDozeStart">Color doze start</label>
          <input type="text" id="colorDozeStart" value="19:00" style="display:none">
        </div>
        <div class="time-row">
          <label for="colorDozeEnd">Color doze end</label>
          <input type="text" id="colorDozeEnd" value="23:00" style="display:none">
        </div>
      </div>
    </section>

    <section class="control-group">
      <h2>Color</h2>
      <div class="slider-row">
        <label for="minColorTemp">Temp min</label>
        <input type="range" id="minColorTemp" min="1000" max="10000" step="50" value="2700">
        <input type="number" class="num-input" id="minColorTempNum" min="1000" max="10000" step="50" value="2700">
      </div>
      <div class="slider-row">
        <label for="maxColorTemp">Temp max</label>
        <input type="range" id="maxColorTemp" min="1000" max="10000" step="50" value="5500">
        <input type="number" class="num-input" id="maxColorTempNum" min="1000" max="10000" step="50" value="5500">
      </div>

      <div class="section-divider"></div>

      <div class="toggle-row">
        <input type="checkbox" id="useRgbColor">
        <label for="useRgbColor">Use RGB instead</label>
      </div>
      <div id="rgbControls" style="display:none;">
        <div class="color-row">
          <label for="rgbStartColor">Start color</label>
          <input type="color" id="rgbStartColor" value="#ff8000">
          <button id="rgbStartColorReset" type="button" class="color-reset-btn" title="Reset start color">Reset</button>
        </div>
        <div class="color-row">
          <label for="rgbEndColor">End color</label>
          <input type="color" id="rgbEndColor" value="#bddfff">
          <button id="rgbEndColorReset" type="button" class="color-reset-btn" title="Reset end color">Reset</button>
        </div>
      </div>
    </section>

    <section class="control-group">
      <div class="toggle-row">
        <input type="checkbox" id="sunShiftEnabled">
        <label for="sunShiftEnabled" class="toggle-heading">Sun shift</label>
      </div>
      <div id="sunShiftControls" style="display:none;">
        <div class="slider-row">
          <label for="sunShiftStrength">Strength</label>
          <input type="range" id="sunShiftStrength" min="0" max="40" step="1" value="10">
          <input type="number" class="num-input" id="sunShiftStrengthNum" min="0" max="2" step="0.05" value="0.5">
        </div>
        <div class="toggle-row">
          <input type="checkbox" id="useLocation">
          <label for="useLocation">Use my location</label>
        </div>
        <span id="locationStatus" class="location-status"></span>
        <div class="time-row">
          <label for="sunrise">Sunrise</label>
          <input type="text" id="sunrise" value="06:30" style="display:none">
          <button type="button" class="time-reset-btn" data-for="sunrise" title="Reset">Reset</button>
        </div>
        <div class="time-row">
          <label for="sunset">Sunset</label>
          <input type="text" id="sunset" value="19:30" style="display:none">
          <button type="button" class="time-reset-btn" data-for="sunset" title="Reset">Reset</button>
        </div>
      </div>
    </section>

    <section class="control-group">
      <div class="toggle-row">
        <input type="checkbox" id="luxEnabled">
        <label for="luxEnabled" class="toggle-heading">Lux sensor</label>
      </div>
      <div id="luxControls" style="display:none;">
        <div class="slider-row">
          <label for="luxStrength">Strength</label>
          <input type="range" id="luxStrength" min="0" max="20" step="1" value="10">
          <input type="number" class="num-input" id="luxStrengthNum" min="0" max="20" step="1" value="10">
        </div>
        <div class="slider-row">
          <label for="currentLux">Current lux</label>
          <input type="range" id="currentLux" min="0" max="90000" step="1" value="5000">
          <input type="number" class="num-input" id="currentLuxNum" min="0" max="90000" value="5000">
        </div>
        <div class="slider-row">
          <label for="effectiveMax">Max lux</label>
          <input type="range" id="effectiveMax" min="100" max="100000" step="1" value="10000">
          <input type="number" class="num-input" id="effectiveMaxNum" min="100" max="100000" value="10000">
        </div>
      </div>
    </section>

    <section class="control-group">
      <div class="toggle-row">
        <input type="checkbox" id="exportImportEnabled">
        <label for="exportImportEnabled" class="toggle-heading">Export / import</label>
      </div>
      <div id="exportImportControls" style="display:none;">
        <textarea id="exportImportBox" rows="10" spellcheck="false" placeholder="Paste config here to import..."></textarea>
        <button id="importBtn" type="button" class="import-btn">Import</button>
      </div>
    </section>

  </aside>

  <div id="resize-handle"></div>

  <main id="chart-area">
    <button id="sidebarShow" type="button" title="Show sidebar">
      <svg aria-hidden="true" viewBox="0 0 24 24"><use href="#icon-sidebar-panel"/></svg>
    </button>
    <div id="chartCanvasShell">
      <canvas id="curveChart"></canvas>
    </div>
  </main>

  <script src="resources/timepicker.js"></script>
  <script src="resources/chart-lite.js"></script>
  <script src="resources/sun.js"></script>
  <script src="resources/engine.js"></script>
  <script src="resources/app.js"></script>
</body>
</html>
