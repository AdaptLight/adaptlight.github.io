<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AdaptLight Visualizer</title>
  <meta name="color-scheme" content="light dark">
  <script>
    (() => {
      var saved = localStorage.getItem("theme");
      var theme = saved || (window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
      var root = document.documentElement;
      var meta = document.querySelector('meta[name="color-scheme"]');
      var scheme = theme === "light" ? "only light" : "dark light";
      root.setAttribute("data-theme", theme);
      if (meta) meta.content = scheme;
      root.style.colorScheme = scheme;
      root.style.backgroundColor = theme === "light" ? "#f5f5f5" : "#0c0c0e";
    })();
  </script>
  <style>
    html { background: #0c0c0e; color-scheme: dark light; }
    html[data-theme="light"] { background: #f5f5f5; color-scheme: only light; }
    html[data-theme="dark"] { background: #0c0c0e; color-scheme: dark light; }
    @media (prefers-color-scheme: light) {
      html:not([data-theme="dark"]) { background: #f5f5f5; color-scheme: only light; }
    }
  </style>
  <link rel="icon" href="resources/icon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="resources/style.css">
</head>
<body>

  <aside id="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-title-block">
        <a class="sidebar-title" href="https://github.com/AdaptLight/adapt-light" target="_blank" rel="noopener noreferrer">
          <img src="resources/icon.svg" alt="" width="20" height="20">
          <h1>AdaptLight</h1>
        </a>
        <span class="sidebar-subtitle">Visualizer</span>
      </div>
      <div class="header-buttons">
        <button id="themeToggle" type="button" title="Toggle light/dark mode">
          <svg id="themeIconSun" aria-hidden="true" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
          <svg id="themeIconMoon" aria-hidden="true" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        </button>
        <button id="sidebarHide" type="button" title="Hide sidebar">
          <svg aria-hidden="true" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="9" y1="3" x2="9" y2="21"/><polyline points="15 8 12 12 15 16"/></svg>
        </button>
      </div>
    </div>

    <div class="curve-type-row">
      <section class="control-group">
        <h2>Curve Type</h2>
        <div class="toggle-row">
          <select id="curveType">
            <option value="linear" selected>Linear</option>
            <option value="smooth">Smooth/Cosine</option>
            <option value="steep">Steep/Tanh</option>
            <option value="ease_in">Ease-in</option>
            <option value="ease_out">Ease-out</option>
          </select>
        </div>
      </section>
      <button id="overlayToggle" type="button" title="Toggle grid & time overlay">
        <svg id="overlayIconShow" aria-hidden="true" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        <svg id="overlayIconHide" aria-hidden="true" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
      </button>
    </div>

    <section class="control-group">
      <h2>Brightness</h2>
      <div class="slider-row">
        <label for="minBrightness">Min</label>
        <input type="range" id="minBrightness" min="0" max="100" value="10">
        <input type="number" class="num-input" id="minBrightnessNum" min="0" max="100" value="10">
      </div>
      <div class="slider-row">
        <label for="maxBrightness">Max</label>
        <input type="range" id="maxBrightness" min="0" max="100" value="100">
        <input type="number" class="num-input" id="maxBrightnessNum" min="0" max="100" value="100">
      </div>
    </section>

    <section class="control-group">
      <h2>Timing</h2>
      <div class="time-row">
        <label for="wakeStart">Wake start</label>
        <input type="time" id="wakeStart" value="07:00">
      </div>
      <div class="time-row">
        <label for="wakeEnd">Wake end</label>
        <input type="time" id="wakeEnd" value="09:00">
      </div>
      <div class="time-row">
        <label for="dozeStart">Doze start</label>
        <input type="time" id="dozeStart" value="20:00">
      </div>
      <div class="time-row">
        <label for="dozeEnd">Doze end</label>
        <input type="time" id="dozeEnd" value="22:00">
      </div>

      <div class="section-divider"></div>

      <div class="toggle-row">
        <input type="checkbox" id="syncCurves" checked>
        <label for="syncCurves">Sync color timing</label>
      </div>
      <div id="colorTimingSection" style="display:none;">
        <div class="time-row">
          <label for="colorWakeStart">Color wake start</label>
          <input type="time" id="colorWakeStart" value="05:30">
        </div>
        <div class="time-row">
          <label for="colorWakeEnd">Color wake end</label>
          <input type="time" id="colorWakeEnd" value="09:00">
        </div>
        <div class="time-row">
          <label for="colorDozeStart">Color doze start</label>
          <input type="time" id="colorDozeStart" value="19:00">
        </div>
        <div class="time-row">
          <label for="colorDozeEnd">Color doze end</label>
          <input type="time" id="colorDozeEnd" value="23:00">
        </div>
      </div>
    </section>

    <section class="control-group">
      <h2>Color</h2>
      <div class="slider-row">
        <label for="minColorTemp">Temp min</label>
        <input type="range" id="minColorTemp" min="1000" max="10000" step="100" value="2700">
        <input type="number" class="num-input" id="minColorTempNum" min="1000" max="10000" step="100" value="2700">
      </div>
      <div class="slider-row">
        <label for="maxColorTemp">Temp max</label>
        <input type="range" id="maxColorTemp" min="1000" max="10000" step="100" value="5500">
        <input type="number" class="num-input" id="maxColorTempNum" min="1000" max="10000" step="100" value="5500">
      </div>

      <div class="section-divider"></div>

      <div class="toggle-row">
        <input type="checkbox" id="useRgbColor">
        <label for="useRgbColor">Use RGB instead</label>
      </div>
      <div id="rgbControls" style="display:none;">
        <div class="color-row">
          <label for="rgbStartColor">Start color</label>
          <input type="color" id="rgbStartColor" value="#ff8000">
          <button id="rgbStartColorReset" type="button" class="color-reset-btn" title="Reset start color">Reset</button>
        </div>
        <div class="color-row">
          <label for="rgbEndColor">End color</label>
          <input type="color" id="rgbEndColor" value="#bddfff">
          <button id="rgbEndColorReset" type="button" class="color-reset-btn" title="Reset end color">Reset</button>
        </div>
      </div>
    </section>

    <section class="control-group">
      <h2>Sun Shift</h2>
      <div class="toggle-row">
        <input type="checkbox" id="sunShiftEnabled">
        <label for="sunShiftEnabled">Enable</label>
      </div>
      <div id="sunShiftControls" style="display:none;">
        <div class="slider-row">
          <label for="sunShiftStrength">Strength</label>
          <input type="range" id="sunShiftStrength" min="0" max="30" step="1" value="10">
          <input type="number" class="num-input" id="sunShiftStrengthNum" min="0" max="30" step="1" value="10">
        </div>
        <div class="toggle-row">
          <input type="checkbox" id="useLocation">
          <label for="useLocation">Use my location</label>
        </div>
        <span id="locationStatus" class="location-status"></span>
        <div class="time-row">
          <label for="sunrise">Sunrise</label>
          <input type="time" id="sunrise" value="06:30">
        </div>
        <div class="time-row">
          <label for="sunset">Sunset</label>
          <input type="time" id="sunset" value="19:30">
        </div>
      </div>
    </section>

    <section class="control-group">
      <h2>Lux Sensor</h2>
      <div class="toggle-row">
        <input type="checkbox" id="luxEnabled">
        <label for="luxEnabled">Enable</label>
      </div>
      <div id="luxControls" style="display:none;">
        <div class="slider-row">
          <label for="luxStrength">Strength</label>
          <input type="range" id="luxStrength" min="0" max="20" step="1" value="10">
          <input type="number" class="num-input" id="luxStrengthNum" min="0" max="20" step="1" value="10">
        </div>
        <div class="slider-row">
          <label for="currentLux">Current lux</label>
          <input type="range" id="currentLux" min="0" max="90000" step="100" value="5000">
          <input type="number" class="num-input" id="currentLuxNum" min="0" max="90000" step="100" value="5000">
        </div>
        <div class="slider-row">
          <label for="effectiveMax">Max lux</label>
          <input type="range" id="effectiveMax" min="100" max="100000" step="100" value="10000">
          <input type="number" class="num-input" id="effectiveMaxNum" min="100" max="100000" step="100" value="10000">
        </div>
      </div>
    </section>

  </aside>

  <div id="resize-handle"></div>

  <main id="chart-area">
    <button id="sidebarShow" type="button" title="Show sidebar">
      <svg aria-hidden="true" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="9" y1="3" x2="9" y2="21"/><polyline points="12 8 15 12 12 16"/></svg>
    </button>
    <div id="chartCanvasShell">
      <canvas id="curveChart"></canvas>
    </div>
  </main>

  <script src="resources/chart-lite.js"></script>
  <script src="resources/sun.js"></script>
  <script src="resources/engine.js"></script>
  <script src="resources/app.js"></script>
</body>
</html>
